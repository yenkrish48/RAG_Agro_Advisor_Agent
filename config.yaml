chunking:
  chunk_size: 1000
  chunk_overlap: 200
  separator: "\n\n"

embeddings:
  model_name: "all-MiniLM-L12-v2"
  dimension: 384

vectordb:
  type: "chromadb"
  persist_directory: "./vectorstore"
  collection_name: "agro_docs"

retrieval:
  top_k: 3
  similarity_threshold: 0.7

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  temperature: 0.0

app:
  log_level: "INFO"
  interactive_mode: true